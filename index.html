<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow: hidden;
  text-align: center;
  color: white;
}

.container {
  margin-top: 80px;
}

h1 {
  font-size: 2.8rem;
}

p {
  font-size: 1.2rem;
}

button {
  padding: 12px 20px;
  margin: 10px;
  font-size: 16px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
}

#yesBtn {
  background: #ff4d6d;
  color: white;
}

#noBtn {
  background: #333;
  color: white;
  position: absolute;
}

#typeText {
  margin-top: 20px;
  font-size: 1.3rem;
  height: 30px;
}

#finalScreen {
  display: none;
  margin-top: 40px;
}

img {
  width: 200px;
  height: 200px;
  border-radius: 15px;
  object-fit: cover;
}

/* Floating hearts */
.heart {
  position: absolute;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% {transform: translateY(0);}
  100% {transform: translateY(-100vh);}
}
</style>
</head>

<body>

<!-- 🎵 Background Music -->
<audio id="bgMusic" loop>
  <source src="your-music.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <h1>I'm Really Sorry My Love 🥺❤️</h1>
  <p>Please forgive me... I’ll make everything right 💕</p>

  <button id="yesBtn">Ok I forgive you 😘</button>
  <button id="noBtn">I don't want your sorry 😤</button>

  <div id="typeText"></div>

  <!-- 📸 Photo Slideshow -->
  <div id="finalScreen">
    <h2>I LOVE YOU SO MUCH ❤️✨</h2>
    <img id="slideshow" src="photo1.jpg">
  </div>
</div>

<script>
// Moving NO button 😈
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * (window.innerWidth - 150);
  const y = Math.random() * (window.innerHeight - 100);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

// Typewriter effect 💌
const text = "You mean everything to me... I'm really sorry ❤️";
let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("typeText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 50);
  }
}

// YES button 💖
const music = document.getElementById("bgMusic");

document.getElementById("yesBtn").addEventListener("click", () => {
  music.play(); // 🔥 this will work now

  document.getElementById("finalScreen").style.display = "block";
  typeWriter();
  startHearts();
  startSlideshow();
});

// Floating hearts animation 💕
function startHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 20 + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }, 300);
}

// Slideshow 📸
const images = ["photo1.jpg", "photo2.jpg", "photo3.jpg"];
let index = 0;

function startSlideshow() {
  setInterval(() => {
    index = (index + 1) % images.length;
    document.getElementById("slideshow").src = images[index];
  }, 2000);
}
</script>

</body>
</html>
